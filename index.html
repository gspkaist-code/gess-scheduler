<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GI × Team Meeting Scheduler — GESS 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --teal:       #3D7A7A;
    --teal-dark:  #2A6060;
    --teal-mid:   #5B9EA0;
    --teal-light: #C8D8C8;
    --teal-pale:  #EBF4EE;
    --teal-faint: #F5FAF7;
    --text:       #1A2E2E;
    --muted:      #6B8A8A;
    --faint:      #A0BCBC;
    --border:     #D0E4E4;
    --white:      #FFFFFF;
    --green-bg:   #C8D8C8;
    --green-txt:  #2A6060;
    --eve-bg:     #EEF0FA;
    --eve-txt:    #3D4A7A;
    --radius:     10px;
    --radius-sm:  6px;
    --shadow:     0 2px 12px rgba(61,122,122,.10);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--teal-faint); color: var(--text); min-height: 100vh; }

  .topbar { background: var(--teal); padding: 0 2rem; height: 56px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
  .topbar-logo { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: .02em; }
  .topbar-logo span { opacity: .5; font-weight: 300; margin: 0 6px; }
  .topbar-badge { background: rgba(255,255,255,.15); color: #fff; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; margin-left: 12px; }

  .main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 1.5rem; }
  .card-head { padding: 13px 20px; background: var(--teal-pale); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .card-head-title { font-size: 12px; font-weight: 600; color: var(--teal-dark); letter-spacing: .05em; text-transform: uppercase; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .leg-dot { width: 14px; height: 14px; border-radius: 4px; border: 1px solid var(--border); }

  .grid-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 560px; }

  /* row 1: day headers */
  th.team-th { text-align: left; padding-left: 20px; min-width: 130px; font-size: 12px; font-weight: 600; color: var(--muted); padding-top: 10px; padding-bottom: 10px; }
  th.day-th { color: #fff !important; font-weight: 700 !important; font-size: 12px !important; padding: 9px 6px; }
  th.day-wed { background: var(--teal) !important; }
  th.day-thu { background: #4A7A6A !important; }
  th.sep-th { width: 10px; background: #e8e8e8 !important; padding: 0 !important; }

  /* row 2: time slots */
  th.time-th { font-family: 'DM Mono', monospace; font-size: 10px !important; padding: 6px 4px; }
  th.time-wed { background: var(--eve-bg); color: var(--eve-txt) !important; }
  th.time-thu { background: #EAF0EC; color: #2A4A3A !important; }

  td { border-bottom: 1px solid #F0F5F0; padding: 5px 4px; text-align: center; }
  td.team-td { text-align: left; padding-left: 20px; font-size: 13px; font-weight: 600; color: var(--teal-dark); white-space: nowrap; }
  td.sep-td { background: #f0f0f0 !important; padding: 0 !important; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--teal-faint); }
  tr:hover td.sep-td { background: #e8e8e8 !important; }

  .sb { width: 40px; height: 30px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--white); cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; justify-content: center; transition: all .12s; color: var(--faint); }
  .sb:hover { border-color: var(--teal-mid); background: var(--teal-pale); color: var(--teal); }
  .sb.avail { background: var(--green-bg); border-color: var(--teal-mid); color: var(--green-txt); font-weight: 700; }
  .sb.assigned { background: var(--teal); border-color: var(--teal-dark); color: #fff; box-shadow: 0 2px 6px rgba(61,122,122,.3); }

  .actions { display: flex; gap: 10px; padding: 14px 20px; border-top: 1px solid var(--border); flex-wrap: wrap; align-items: center; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; border: 1.5px solid transparent; }
  .btn-p { background: var(--teal); color: #fff; border-color: var(--teal-dark); }
  .btn-p:hover { background: var(--teal-dark); }
  .btn-s { background: var(--white); color: var(--muted); border-color: var(--border); }
  .btn-s:hover { background: var(--teal-pale); color: var(--teal-dark); }
  .notice { font-size: 12px; color: var(--muted); margin-left: auto; padding: 6px 14px; background: var(--teal-pale); border-radius: var(--radius-sm); border: 1px solid var(--border); display: none; }

  .sched-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 16px 20px; }
  .tcard { border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; transition: all .15s; background: var(--white); }
  .tcard:hover { box-shadow: var(--shadow); }
  .tcard.ok { border-color: var(--teal-mid); background: var(--teal-pale); }
  .tcard .tn { font-size: 13px; font-weight: 600; color: var(--teal-dark); margin-bottom: 6px; }
  .tcard .ts { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); line-height: 1.8; }
  .tcard.ok .ts { color: var(--teal-dark); font-weight: 500; }
  .tc-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
  .b-ok { background: var(--green-bg); color: var(--green-txt); }
  .b-no { background: #F0F0F0; color: #999; }

  .export-panel { background: var(--teal-faint); border: 1px dashed var(--teal-light); border-radius: var(--radius); padding: 16px 20px; margin: 0 20px 20px; display: none; }
  .export-panel.on { display: block; }
  .export-title { font-size: 12px; font-weight: 600; color: var(--teal-dark); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
  .etable { width: 100%; border-collapse: collapse; font-size: 12px; }
  .etable th { font-size: 11px; text-align: left; padding: 5px 10px; background: var(--teal-light); color: var(--teal-dark); border: none; }
  .etable td { padding: 6px 10px; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; color: var(--text); text-align: left; }
  .copy-btn { margin-top: 10px; padding: 7px 16px; border-radius: var(--radius-sm); border: 1.5px solid var(--teal-light); background: var(--white); color: var(--teal-dark); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; }
  .copy-btn:hover { background: var(--teal-pale); }

  @media (max-width: 600px) {
    .main { padding: 1rem 1rem 3rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center">
    <div class="topbar-logo">GI <span>×</span> Team Meetings</div>
    <div class="topbar-badge">GESS 2026</div>
  </div>
</div>

<div class="main">
  <div class="card">
    <div class="card-head">
      <div class="card-head-title">Step 1 — Mark availability</div>
      <div class="legend">
        <div class="leg"><div class="leg-dot" style="background:var(--green-bg);border-color:var(--teal-mid)"></div>Available</div>
        <div class="leg"><div class="leg-dot" style="background:var(--teal);border-color:var(--teal-dark)"></div>Assigned</div>
        <div class="leg"><div class="leg-dot"></div>Unavailable</div>
      </div>
    </div>
    <div class="grid-scroll"><table id="availTable"></table></div>
    <div class="actions">
      <button class="btn btn-p" onclick="autoAssign()">✦ Auto-assign</button>
      <button class="btn btn-s" onclick="resetAll()">↺ Reset all</button>
      <button class="btn btn-p" onclick="toggleExport()">↗ Export schedule</button>
      <div class="notice" id="notice"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-head"><div class="card-head-title">Step 2 — Confirmed schedule</div></div>
    <div class="sched-grid" id="schedGrid"></div>
  </div>

  <div class="card">
    <div class="export-panel" id="exportPanel">
      <div class="export-title">📋 Ready to copy into slides</div>
      <table class="etable">
        <thead><tr><th>Team</th><th>Date</th><th>Time</th><th>Location</th></tr></thead>
        <tbody id="exportBody"></tbody>
      </table>
      <button class="copy-btn" onclick="copyExport()">Copy as text</button>
    </div>
  </div>
</div>

<script>
const TEAMS = ['Gleamo','MARKS','Be More','Habitus','conVRsation','CUPID','Gollem','Nexus'];
const DAYS = [
  { label:'May 20 (Wed)', key:'0520', slots:['18:00','19:00','20:00','21:00'], cls:'wed' },
  { label:'May 21 (Thu)', key:'0521', slots:['18:00','19:00','20:00','21:00'], cls:'thu' },
];

let availability = {};
let assigned = {};

function initState() {
  TEAMS.forEach(t => {
    assigned[t] = null;
    DAYS.forEach(d => d.slots.forEach(s => {
      availability[`${t}_${d.key}_${s}`] = false;
    }));
  });
}
initState();

function renderTable() {
  // Row 1: Team | May 20 (4 cols) | sep | May 21 (4 cols)
  let row1 = `<th class="team-th" rowspan="2">Team</th>`;
  DAYS.forEach((d, i) => {
    row1 += `<th colspan="${d.slots.length}" class="day-th day-${d.cls}">${d.label} · Evening</th>`;
    if (i < DAYS.length - 1) row1 += `<th class="sep-th" rowspan="2"></th>`;
  });

  // Row 2: time slots
  let row2 = '';
  DAYS.forEach((d, i) => {
    row2 += d.slots.map(s => `<th class="time-th time-${d.cls}">${s}</th>`).join('');
    if (i < DAYS.length - 1) row2 += '';
  });

  let html = `<thead><tr>${row1}</tr><tr>${row2}</tr></thead><tbody>`;

  TEAMS.forEach(team => {
    html += `<tr><td class="team-td">${team}</td>`;
    DAYS.forEach((d, i) => {
      d.slots.forEach(s => { html += slotCell(team, d.key, s); });
      if (i < DAYS.length - 1) html += `<td class="sep-td"></td>`;
    });
    html += `</tr>`;
  });
  html += '</tbody>';
  document.getElementById('availTable').innerHTML = html;
}

function slotCell(team, day, slot) {
  const isAssigned = assigned[team]?.day===day && assigned[team]?.slot===slot;
  const isAvail    = availability[`${team}_${day}_${slot}`];
  const cls  = isAssigned ? 'assigned' : isAvail ? 'avail' : '';
  const icon = (isAssigned||isAvail) ? '✓' : '–';
  return `<td><button class="sb ${cls}" onclick="toggleSlot('${team}','${day}','${slot}')">${icon}</button></td>`;
}

function toggleSlot(team, day, slot) {
  if (assigned[team]?.day===day && assigned[team]?.slot===slot) assigned[team]=null;
  availability[`${team}_${day}_${slot}`] = !availability[`${team}_${day}_${slot}`];
  renderTable(); renderSchedule(); renderExport();
}

function autoAssign() {
  assigned = {}; TEAMS.forEach(t => assigned[t]=null);
  const used = {};
  TEAMS.forEach(team => {
    outer: for (const d of DAYS)
      for (const s of d.slots) {
        const k=`${team}_${d.key}_${s}`, sk=`${d.key}_${s}`;
        if (availability[k] && !used[sk]) {
          assigned[team]={day:d.key, slot:s, dayLabel:d.label};
          used[sk]=team; break outer;
        }
      }
  });
  const miss = TEAMS.filter(t=>!assigned[t]);
  showNotice(miss.length===0 ? '✓ All 8 teams assigned!' : '⚠ Could not assign: '+miss.join(', '));
  renderTable(); renderSchedule(); renderExport();
}

function renderSchedule() {
  document.getElementById('schedGrid').innerHTML = TEAMS.map(t => {
    if (assigned[t]) {
      const d = DAYS.find(x=>x.key===assigned[t].day);
      return `<div class="tcard ok"><div class="tc-badge b-ok">Confirmed</div><div class="tn">${t}</div><div class="ts">📅 ${d.label}<br>🕐 ${assigned[t].slot}<br>📍 W2-1 Rm.200 / Zoom</div></div>`;
    }
    return `<div class="tcard no"><div class="tc-badge b-no">Pending</div><div class="tn">${t}</div><div class="ts" style="color:var(--faint);font-style:italic">Not assigned yet</div></div>`;
  }).join('');
}

function renderExport() {
  document.getElementById('exportBody').innerHTML = TEAMS.map(t => {
    if (assigned[t]) {
      const d=DAYS.find(x=>x.key===assigned[t].day);
      return `<tr><td>${t}</td><td>${d.label}</td><td>${assigned[t].slot}</td><td>W2-1 Rm. 200 or Zoom</td></tr>`;
    }
    return `<tr><td>${t}</td><td colspan="3" style="color:var(--faint);font-style:italic">Not assigned</td></tr>`;
  }).join('');
}
function toggleExport() { document.getElementById('exportPanel').classList.toggle('on'); renderExport(); }
function copyExport() {
  const lines = TEAMS.map(t => {
    if (assigned[t]) { const d=DAYS.find(x=>x.key===assigned[t].day); return `${t}\t${d.label}\t${assigned[t].slot}\tW2-1 Rm. 200 or Zoom`; }
    return `${t}\tNot assigned\t\t`;
  });
  navigator.clipboard.writeText(lines.join('\n'))
    .then(()=>showNotice('Copied to clipboard!'))
    .catch(()=>showNotice('Select the table and copy manually.'));
}
function resetAll() { initState(); renderTable(); renderSchedule(); renderExport(); showNotice('Reset complete.'); }
function showNotice(msg) {
  const el=document.getElementById('notice');
  el.textContent=msg; el.style.display='block';
  clearTimeout(el._t); el._t=setTimeout(()=>el.style.display='none',3500);
}

renderTable(); renderSchedule();
</script>
</body>
</html>
